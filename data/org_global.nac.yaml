meraki:
  domains:
    - name: US
      administrator:
        name: root
      organizations:
        - name: !env org_name
          managed: false
          login_security:
            enforce_password_expiration: false
            password_expiration_days: 40
            enforce_different_passwords: true
            num_different_passwords: 3
            enforce_strong_passwords: true
            enforce_account_lockout: true
            account_lockout_attempts: 5
            enforce_idle_timeout: true
            idle_timeout_minutes: 90
          snmp:
            v2c: false
            v3: true
            v3_auth_mode: MD5
            v3_auth_pass: !env v3_auth_pass
            v3_priv_mode: AES128
            v3_priv_pass: !env v3_priv_pass
            peer_ips: []
          appliance:
            vpn_firewall_rules:
              rules:
                - comment: "Shared Services"
                  destination_cidr: "10.102.1.157/32,10.102.1.160/32,10.102.1.161/32"
                  destination_port: "Any"
                  policy: allow
                  protocol: any
                  source_cidr: "10.10.0.0/16,10.30.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "Shared Services"
                  destination_cidr: "10.10.0.0/16,10.30.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: allow
                  protocol: any
                  source_cidr: "10.102.1.157/32,10.102.1.160/32,10.102.1.161/32"
                  source_port: "Any"
                  syslog: false
                - comment: "Data Access"
                  destination_cidr: "10.30.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.10.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "IoT Access"
                  destination_cidr: "10.10.0.0/16,10.20.0.0/16,10.250.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.30.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "Infra Access"
                  destination_cidr: "10.10.0.0/16,10.20.0.0/16,10.30.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.250.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "Voice Access"
                  destination_cidr: "10.10.0.0/16,10.250.0.0/16,10.30.0.0/16,10.40.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.20.0.0/16"
                  source_port: "Any"
                  syslog: false
                - comment: "PCI Access"
                  destination_cidr: "10.10.0.0/16,10.250.0.0/16,10.30.0.0/16,10.20.0.0/16"
                  destination_port: "Any"
                  policy: deny
                  protocol: any
                  source_cidr: "10.40.0.0/16"
                  source_port: "Any"
                  syslog: false
              syslog_default_rule: false
